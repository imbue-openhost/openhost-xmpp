[app]
name = "xmpp"
version = "0.1.0"
description = "Prosody XMPP server with MAM, carbons, stream management, file uploads, and MUC"
authors = ["Andrew Laack <andrew@laack.co>"]

[runtime.container]
image = "Dockerfile"
# The OpenHost router proxies HTTP to this port.  The sidecar
# exposes:
#   * /healthz (router liveness probe)
#   * /              (public landing page describing the
#                     XMPP-client connect URIs)
#   * /users         (owner-only user-management page)
#   * /api/users[/…] (owner-only user CRUD JSON API used by the
#                     management page's JS)
# The actual XMPP protocol lives on the [[ports]] below, which
# OpenHost publishes on the host directly (bypassing the router).
port = 8080

# XMPP client-to-server, STARTTLS upgrade path.  Modern clients
# (Conversations, Dino, Gajim, Monal) all try 5222 with STARTTLS first
# and fall through to direct-TLS on 5223.
[[ports]]
label = "c2s"
container_port = 5222
host_port = 5222

# XMPP direct-TLS client-to-server (XEP-0368).  Works out of the box
# with our self-signed cert for modern clients that honour the cert
# and XEP-0368 SRV record.  Preferred over STARTTLS on hostile
# networks that downgrade cleartext XMPP greetings.
[[ports]]
label = "c2s-tls"
container_port = 5223
host_port = 5223

# Server-to-server federation (STARTTLS).  The XMPP domain this
# server serves is ``<app-name>.<zone-domain>`` by default
# (``xmpp.<zone-domain>`` for a stock deploy), so federating peers
# expect a cert that covers that FQDN.  Without a real cert matching
# it, federation to other servers will fail with cert-validation
# errors — this port is still open so federation starts working as
# soon as the operator drops real certs into the data directory.
[[ports]]
label = "s2s"
container_port = 5269
host_port = 5269

# Server-to-server direct-TLS (XEP-0368 s2s).
[[ports]]
label = "s2s-tls"
container_port = 5270
host_port = 5270

# HTTP — BOSH (XEP-0124/0206), XMPP-over-WebSocket (RFC 7395), and
# HTTP file-share (XEP-0363) are all served by Prosody on 5280/5281.
# Needed for: web-based XMPP clients (Converse.js, Movim), mobile
# clients pinning XEP-0368 that still want file-share HTTPS, and
# XEP-0156 alternative-connection hints.  The OpenHost router only
# proxies a single port (``port = 8080`` above, the healthcheck
# sidecar); clients reach BOSH/WS/file-share at the zone hostname on
# these ports directly.
[[ports]]
label = "http"
container_port = 5280
host_port = 5280

[[ports]]
label = "https"
container_port = 5281
host_port = 5281

[resources]
# Prosody is Lua: ~50-80 MB RSS idle.  HTTP file uploads and MAM
# archival each add a modest working set.  256 MB is comfortable for
# a personal / family-sized server (~50 active users).
memory_mb = 256
cpu_millicores = 250

[routing]
# OpenHost's public_paths matcher treats each entry as a prefix:
# ``"/"`` matches every URL on the app.  Listing a more specific
# subset wouldn't help because there's no entry that means "just
# the bare slash".  We need the landing page (/) and the health
# check (/healthz) reachable without an OpenHost session, AND a
# private management surface (/users + /api/users[/...]) that's
# reachable only to the compute-space owner.
#
# The split is enforced INSIDE the sidecar: every owner-only route
# checks the ``X-OpenHost-Is-Owner: true`` header that OpenHost
# forwards on authenticated-owner requests, and rejects everything
# else (with a 302 to /login for HTML clients, 401 for API
# clients).  See ``sidecar/server.py``'s ``_owner_only`` helper —
# this mirrors the pattern openhost-gemini uses for its editor.
#
# The XMPP protocol itself has its own authentication and lives on
# the [[ports]] above, NOT behind the OpenHost router.
public_paths = ["/"]

[data]
# Persistent: SQLite DB with user accounts, roster, MAM archive, PEP
# pubsub data; admin password stash; TLS cert/key pair.
app_data = true
